name: Download Weather Satellite Images

on:
  schedule:
    # Run every hour (you can change to */30 for every 30 minutes)
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  download-images:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Create images directory
      run: mkdir -p images/2026
        
    - name: Download satellite images
      run: |
        python scripts/download_images.py --days 2
        
    - name: Configure Git
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        
    - name: Commit and push if changed
      run: |
        git add images/
        if ! git diff --staged --quiet; then
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Update satellite images - $TIMESTAMP"
          git push
          echo "✅ New images committed and pushed"
        else
          echo "ℹ️ No new images to commit"
        fi
