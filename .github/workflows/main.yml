name: Dump Weather Satellite Images

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run satellite image dumper
        run: |
          python sat_image_dumper.py

      - name: Ensure images folder exists
        run: mkdir -p images

      - name: Commit and push images
        run: |
          git config --global user.name "gh-actions-bot"
          git config --global user.email "gh-actions-bot@example.com"
          git add images/
          git diff --cached --quiet || (git commit -m "Add new satellite images [bot]" && git push)
